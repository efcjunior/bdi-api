spring:
  application:
    name: bdi-api
  data:
    mongodb:
      auto-index-creation: false

bdi-api:
  synchronization:
    enabled: true
    interval: PT6H
    stale-after: PT12H
    job-retention: P7D

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
