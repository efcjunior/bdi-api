spring:
  application:
    name: bdi-api
  data:
    mongodb:
      auto-index-creation: false

bdi-api:
  synchronization:
    enabled: true
    interval: PT6H
    stale-after: PT12H
    job-retention: P7D
  security:
    jwt:
      issuer: ${AUTH_JWT_ISSUER:https://auth.coding4world.com}
      audience: ${AUTH_JWT_AUDIENCE:bdi-api}
      jwks-uri: ${AUTH_JWKS_URI:}
  open-api:
    public: false
  rate-limit:
    enabled: true
    trust-forwarded-headers: false
    current-bdi:
      capacity: 60
      refill-period: PT1M
    bdi-history:
      capacity: 30
      refill-period: PT1M
    administration:
      capacity: 5
      refill-period: PT1H

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
