spring:
  data:
    mongodb:
      uri: mongodb://localhost:1/bdi-api-test?serverSelectionTimeoutMS=10&connectTimeoutMS=10

bdi-api:
  synchronization:
    enabled: false
  security:
    jwt:
      issuer: https://auth.test.coding4world.com
      audience: bdi-api
      jwks-uri: http://localhost:1/api/v1/auth/jwks
  open-api:
    public: true
  rate-limit:
    enabled: true
    trust-forwarded-headers: false
    current-bdi:
      capacity: 60
      refill-period: PT1M
    bdi-history:
      capacity: 30
      refill-period: PT1M
    administration:
      capacity: 5
      refill-period: PT1H
